<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Channel Interaction Log</title>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>

  <header class="app-header">
    <div class="app-logo" onclick="App.goHome()">Channel Interaction Log</div>
    <div class="header-stats" id="header-stats"></div>
  </header>

  <div class="app-body">

    <!-- SIDEBAR -->
    <aside class="sidebar">
      <div class="sidebar-header">
        <div class="sidebar-title">Каналы</div>
        <div class="search-wrapper">
          <span class="search-icon">⌕</span>
          <input
            type="text"
            id="search-input"
            class="search-input"
            placeholder="Поиск канала…"
            autocomplete="off"
          >
          <button id="search-clear" class="search-clear hidden">✕</button>
          <div id="search-dropdown" class="search-dropdown hidden"></div>
        </div>
      </div>
      <div class="channel-list" id="channel-list">
        <div class="empty-state">Загрузка…</div>
      </div>
    </aside>

    <!-- MAIN -->
    <main class="main-content">

      <!-- Приветствие -->
      <div class="welcome-screen" id="welcome-screen">
        <div class="welcome-logo">
          <h2>Channel Interaction Log</h2>
          <p>Выберите канал из списка слева или найдите через поиск</p>
        </div>
        <div class="recent-section">
          <h3>Последние взаимодействия</h3>
          <div id="recent-list">
            <div class="empty-state">Пока ничего нет</div>
          </div>
        </div>
      </div>

      <!-- Канал -->
      <div class="channel-detail hidden" id="channel-detail">
        <div class="channel-header">
          <div class="channel-header-info">
            <h2 id="channel-title">—</h2>
            <div class="channel-meta" id="channel-id"></div>
          </div>
          <button class="btn-add" id="btn-add">+ Добавить</button>
        </div>
        <div class="interactions-list" id="interactions-list"></div>
      </div>

    </main>
  </div>

  <!-- МОДАЛКА -->
  <div class="modal-overlay hidden" id="modal-overlay">
    <div class="modal">
      <div class="modal-header">
        <h3 id="modal-title">Новое взаимодействие</h3>
        <button class="modal-close" id="modal-close">✕</button>
      </div>
      <div class="modal-body">
        <form id="form-interaction">
          <div class="form-row">
            <div class="form-group">
              <label for="field-type">Тип</label>
              <select id="field-type" required></select>
            </div>
            <div class="form-group">
              <label for="field-date">Дата</label>
              <input type="date" id="field-date" required>
            </div>
          </div>
          <div class="form-row">
            <div class="form-group">
              <label for="field-contact">Контактное лицо</label>
              <input type="text" id="field-contact" placeholder="Имя, должность…">
            </div>
            <div class="form-group">
              <label for="field-priority">Важность</label>
              <select id="field-priority"></select>
            </div>
          </div>
          <div class="form-group">
            <label for="field-note">Заметка</label>
            <textarea id="field-note" placeholder="Краткое описание…"></textarea>
          </div>
        </form>
      </div>
      <div class="modal-footer">
        <button class="btn-secondary" id="modal-cancel">Отмена</button>
        <button class="btn-primary" onclick="document.getElementById('form-interaction').requestSubmit()">Сохранить</button>
      </div>
    </div>
  </div>

  <div class="toast hidden" id="toast"></div>

  <script src="js/storage.js"></script>
  <script src="js/ui.js"></script>
  <script src="js/app.js"></script>

</body>
</html>
